name: rf_example
description: "Flutter MethodChannel + EventChannel 架構示範，以設備盤點 app 為載體。"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 狀態管理
  flutter_riverpod: ^3.0.0

  # 響應式尺寸（設計基準 390×844）
  flutter_screenutil: ^5.9.3

  # 本地 DB（設備清單 / 匯出紀錄）
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  path: ^1.9.1
  path_provider: ^2.1.5

  # 檔案權限（Android 11+ 存取公開 Download 資料夾）
  permission_handler: ^11.3.1

  # 系統檔案選擇器（匯入設備清單時備用）
  file_picker: ^8.1.6

  # Firebase
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.32.1
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

