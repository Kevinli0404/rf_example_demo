name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Fix sqlite3 native assets
        run: |
          SQLITE_VERSION=$(flutter pub deps --json | python3 -c "import sys,json; deps=json.load(sys.stdin)['packages']; print(next(p['version'] for p in deps if p['name']=='sqlite3'))")
          CACHE_DIR="$HOME/.pub-cache/hosted/pub.dev/sqlite3-$SQLITE_VERSION"
          mkdir -p "$CACHE_DIR"
          BASE_URL="https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-$SQLITE_VERSION"
          curl -fsSL "$BASE_URL/libsqlite3.x64.linux.so" -o "$CACHE_DIR/libsqlite3.x64.linux.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.arm.android.so" -o "$CACHE_DIR/libsqlite3.arm.android.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.arm64.android.so" -o "$CACHE_DIR/libsqlite3.arm64.android.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.x64.android.so" -o "$CACHE_DIR/libsqlite3.x64.android.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.x86.android.so" -o "$CACHE_DIR/libsqlite3.x86.android.so" || true

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-dev:
    name: Build dev APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Fix sqlite3 native assets
        run: |
          SQLITE_VERSION=$(flutter pub deps --json | python3 -c "import sys,json; deps=json.load(sys.stdin)['packages']; print(next(p['version'] for p in deps if p['name']=='sqlite3'))")
          CACHE_DIR="$HOME/.pub-cache/hosted/pub.dev/sqlite3-$SQLITE_VERSION"
          mkdir -p "$CACHE_DIR"
          BASE_URL="https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-$SQLITE_VERSION"
          curl -fsSL "$BASE_URL/libsqlite3.x64.linux.so" -o "$CACHE_DIR/libsqlite3.x64.linux.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.arm.android.so" -o "$CACHE_DIR/libsqlite3.arm.android.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.arm64.android.so" -o "$CACHE_DIR/libsqlite3.arm64.android.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.x64.android.so" -o "$CACHE_DIR/libsqlite3.x64.android.so" || true
          curl -fsSL "$BASE_URL/libsqlite3.x86.android.so" -o "$CACHE_DIR/libsqlite3.x86.android.so" || true

      - name: Write google-services.json (dev)
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_DEV }}" | base64 --decode \
            > android/app/src/dev/google-services.json

      - name: Build dev debug APK
        run: flutter build apk --flavor dev --debug --build-number=${{ github.run_number }}

      - name: Upload dev APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: build/app/outputs/flutter-apk/app-dev-debug.apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_DEV }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-dev-debug.apk

  build-prod:
    name: Build prod APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Write google-services.json (prod)
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode \
            > android/app/src/prod/google-services.json
      - name: Build prod release APK
        run: flutter build apk --flavor prod --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-prod-release
          path: build/app/outputs/flutter-apk/app-prod-release.apk
