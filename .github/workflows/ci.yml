name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-dev:
    name: Build dev APK
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write google-services.json (dev)
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_DEV }}" | base64 --decode \
            > android/app/src/dev/google-services.json

      - name: Build dev debug APK
        run: flutter build apk --flavor dev --debug

      - name: Upload dev APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 7
  build-prod:
    name: Build prod APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: startsWith(github.ref, 'refs/tags/v')  # 只在 push tag 時跑

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Write google-services.json (prod)
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_PROD }}" | base64 --decode \
            > android/app/src/prod/google-services.json
      - name: Build prod release APK
        run: flutter build apk --flavor prod --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-prod-release
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 7
